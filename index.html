<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>IT-Grundschutz++ Parser</title>
  <style>
    body { font-family: sans-serif; margin: 2em; }
    .praktik { color: green; }
    .zielobjekt { color: green; }
    .modalverb { color: red; }
    .ergebnis { color: deepskyblue; }
    .handlungswort { color: purple; }
  </style>
</head>
<body>

<h2>IT-Grundschutz++ Satzparser</h2>
<p>Gib einen Anforderungssatz ein:</p>
<input type="text" id="inputSatz" size="100" placeholder="Die Praktik „Konfiguration“ für IT-Systeme SOLLTE die Änderung von Default-Passwörtern vor der ersten Verwendung festlegen.">
<br><br>
<button onclick="parseSatz()">Verarbeiten</button>

<h3>Ergebnis:</h3>
<div id="ausgabe" style="font-size: 1.2em;"></div>

<script>
function parseSatz() {
  const input = document.getElementById("inputSatz").value;
  let output = input;

  // Regeln anwenden (einfaches Matching)
  output = output.replace(/Praktik „([^“]+)“/g, '<span class="praktik">Praktik „$1“</span>');
  output = output.replace(/für ([A-Za-z0-9\- ]+)/g, 'für <span class="zielobjekt">$1</span>');
  output = output.replace(/\b(SOLLTE|KANN)\b/g, '<span class="modalverb">$1</span>');
  output = output.replace(/(die [^ ]+ von [^ ]+ vor der ersten Verwendung)/g, '<span class="ergebnis">$1</span>');
  output = output.replace(/\b(anweisen|verbieten|installieren|deaktivieren|festlegen)\b/g, '<span class="handlungswort">$1</span>');

  document.getElementById("ausgabe").innerHTML = output;
}
</script>

</body>
</html>
