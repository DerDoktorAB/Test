<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IT-Grundschutz++ Satzgenerator</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    textarea { width: 100%; height: 100px; }
    pre { background: #f0f0f0; padding: 10px; }
  </style>
</head>
<body>
  <h1>Satzgenerator für IT-Grundschutz++</h1>
  <p>Geben Sie unten einen Satz ein. Mit Klick auf <em>JSON erzeugen</em> wird der Satz in ein einfaches JSON-Format übertragen.</p>
  <textarea id="sentence" placeholder="Ihr IT-Grundschutz++ Satz..."></textarea>
  <br>
  <button onclick="generateJSON()">JSON erzeugen</button>
  <pre id="output"></pre>
  <script>
    function generateJSON() {
      const text = document.getElementById('sentence').value.trim();
      const json = {
        grundschutzpp: {
          satz: text
        }
      };
      document.getElementById('output').textContent = JSON.stringify(json, null, 2);
    }
  </script>
</body>
</html>
